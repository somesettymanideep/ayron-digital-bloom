<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Page Not Found | Ayron Digital Solutions</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f7f7f7;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

.container{

}

h1{

}

}

p{

}

}

<body>

location.replace("/");
</script>
